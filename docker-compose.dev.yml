# =============================================================================
# SushiChain — Local Development PostgreSQL
# =============================================================================
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# This starts a local PostgreSQL 16 instance for development.
# The database persists in a Docker volume across restarts.
#
# To reset:  docker compose -f docker-compose.dev.yml down -v
# To connect: psql -h localhost -U sushichain -d sushichain_dev
# =============================================================================

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: sushichain-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sushichain
      POSTGRES_PASSWORD: sushichain_dev
      POSTGRES_DB: sushichain_dev
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sushichain -d sushichain_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pg_dev_data:
    driver: local
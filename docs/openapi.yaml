openapi: "3.0.3"
info:
  title: SushiChain Food Ordering API
  description: |
    Complete REST API for the SushiChain omnichannel food ordering platform.
    Covers authentication, menu browsing, cart management, order lifecycle,
    payments, promotions, loyalty program, and full admin back-office.
  version: "1.0.0"
  contact:
    name: SushiChain API Support

servers:
  - url: http://localhost:3000
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication (login, register, token refresh, logout)
  - name: User Profile
    description: Current user profile and addresses
  - name: Branches
    description: Public branch listing and delivery zones
  - name: Menu
    description: Public menu categories and product details
  - name: Cart
    description: Server-side shopping cart (authenticated)
  - name: Orders
    description: Customer order management
  - name: Payments
    description: Payment intent creation and provider webhooks
  - name: Promotions
    description: Public promotion listing and code validation
  - name: Loyalty
    description: Loyalty account balance and transaction history
  - name: Admin
    description: Admin/manager back-office endpoints

paths:
  # ============================================================
  #  AUTH
  # ============================================================
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with email or phone + password. Returns JWT access token, refresh token, user profile, and loyalty info.
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                email:
                  type: string
                  format: email
                  description: User email (provide email OR phone)
                phone:
                  type: string
                  description: User phone (provide email OR phone)
                password:
                  type: string
                  description: User password
              example:
                email: admin@sushichain.com
                password: admin123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register
      description: Create a new user account. Returns tokens, user profile, and loyalty account.
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                phone:
                  type: string
                  description: User phone (phone OR email required)
                email:
                  type: string
                  format: email
                  description: User email (phone OR email required)
                password:
                  type: string
                  description: Password (min 1 char in current impl)
                firstName:
                  type: string
                  default: ""
                lastName:
                  type: string
                  default: ""
              example:
                email: user@example.com
                password: mypassword
                firstName: John
                lastName: Doe
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidate a refresh token, ending the session.
      operationId: authLogout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  description: The refresh token to invalidate
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNull"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchange a valid refresh token for a new access token.
      operationId: authRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    required: [accessToken]
                    properties:
                      accessToken:
                        type: string
                        description: New JWT access token (15 min TTL)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/profile:
    get:
      tags: [Auth]
      summary: Get auth profile
      description: Returns the authenticated user's full profile including loyalty account details.
      operationId: getAuthProfile
      responses:
        "200":
          description: Profile with loyalty info
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/UserProfileWithLoyalty"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  #  USER PROFILE
  # ============================================================
  /api/me:
    get:
      tags: [User Profile]
      summary: Get current user
      description: Get the authenticated user's profile.
      operationId: getMe
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [User Profile]
      summary: Update profile
      description: Update first name, last name, or email of the current user.
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
              example:
                firstName: John
                lastName: Doe
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/me/loyalty:
    get:
      tags: [Loyalty]
      summary: Get loyalty balance
      description: Get the authenticated user's loyalty account (balance, lifetime, tier).
      operationId: getMyLoyalty
      responses:
        "200":
          description: Loyalty account info
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/LoyaltyAccount"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/addresses:
    get:
      tags: [User Profile]
      summary: List saved addresses
      description: Get all saved delivery addresses for the authenticated user, sorted by default first.
      operationId: listAddresses
      responses:
        "200":
          description: List of addresses
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserAddress"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [User Profile]
      summary: Create address
      description: Save a new delivery address. If isDefault is true, all other addresses are unset as default.
      operationId: createAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "201":
          description: Address created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/addresses/{addressId}:
    get:
      tags: [User Profile]
      summary: Get address
      description: Get a specific saved address by ID.
      operationId: getAddress
      parameters:
        - $ref: "#/components/parameters/addressId"
      responses:
        "200":
          description: Address details
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/UserAddress"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [User Profile]
      summary: Update address
      description: Update fields of a saved address.
      operationId: updateAddress
      parameters:
        - $ref: "#/components/parameters/addressId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInput"
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [User Profile]
      summary: Delete address
      description: Remove a saved address.
      operationId: deleteAddress
      parameters:
        - $ref: "#/components/parameters/addressId"
      responses:
        "200":
          description: Address deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNull"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  #  BRANCHES (Public)
  # ============================================================
  /api/branches:
    get:
      tags: [Branches]
      summary: List branches
      description: Get all branches. Filter by open/closed status.
      operationId: listBranches
      security: []
      parameters:
        - name: isOpen
          in: query
          schema:
            type: string
            enum: ["true", "false"]
          description: Filter by open/closed status
      responses:
        "200":
          description: List of branches
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Branch"

  /api/branches/{branchId}:
    get:
      tags: [Branches]
      summary: Get branch detail
      description: Get a single branch with active delivery zones and product/category counts.
      operationId: getBranch
      security: []
      parameters:
        - $ref: "#/components/parameters/branchId"
      responses:
        "200":
          description: Branch with delivery zones and counts
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    allOf:
                      - $ref: "#/components/schemas/Branch"
                      - type: object
                        properties:
                          deliveryZones:
                            type: array
                            items:
                              $ref: "#/components/schemas/DeliveryZone"
                          _count:
                            type: object
                            properties:
                              categories:
                                type: integer
                              products:
                                type: integer
        "404":
          $ref: "#/components/responses/NotFound"

  /api/branches/{branchId}/delivery-zones:
    get:
      tags: [Branches]
      summary: Get delivery zones
      description: Get all active delivery zones for a branch.
      operationId: getDeliveryZones
      security: []
      parameters:
        - $ref: "#/components/parameters/branchId"
      responses:
        "200":
          description: List of delivery zones
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/DeliveryZone"

  # ============================================================
  #  MENU (Public)
  # ============================================================
  /api/menu:
    get:
      tags: [Menu]
      summary: Get menu
      description: >
        Get the full menu for a branch — categories with their products
        (including option groups and options). Only active categories and
        available products are returned.
      operationId: getMenu
      security: []
      parameters:
        - name: branchId
          in: query
          required: true
          schema:
            type: string
          description: Branch ID to load menu for
      responses:
        "200":
          description: Menu categories with nested products
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategoryWithProducts"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/menu/{productId}:
    get:
      tags: [Menu]
      summary: Get product detail
      description: Get a single product with its category and all option groups/options.
      operationId: getProduct
      security: []
      parameters:
        - $ref: "#/components/parameters/productId"
      responses:
        "200":
          description: Product with option groups
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/ProductWithOptions"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  #  CART
  # ============================================================
  /api/cart:
    get:
      tags: [Cart]
      summary: Get cart
      description: Get the authenticated user's cart with items, products, branch info, and computed totals.
      operationId: getCart
      responses:
        "200":
          description: Cart with items and totals
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    oneOf:
                      - type: object
                        description: Cart object (null if no cart)
                        nullable: true
                      - $ref: "#/components/schemas/CartWithTotals"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Cart]
      summary: Create cart
      description: Create a new cart for the given branch. One cart per user; returns 409 if cart already exists.
      operationId: createCart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branchId]
              properties:
                branchId:
                  type: string
                  description: Branch ID to associate the cart with
      responses:
        "201":
          description: Cart created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "409":
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Cart]
      summary: Clear cart
      description: Delete the authenticated user's cart and all its items.
      operationId: clearCart
      responses:
        "200":
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNull"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/cart/items:
    post:
      tags: [Cart]
      summary: Add item to cart
      description: Add a product to the authenticated user's cart with optional selected options.
      operationId: addCartItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId:
                  type: string
                  description: Product ID to add
                quantity:
                  type: integer
                  minimum: 1
                  description: Quantity to add
                selectedOptions:
                  type: array
                  description: Selected option configurations
                  items:
                    type: object
                    required: [optionId, groupId, name]
                    properties:
                      optionId:
                        type: string
                      groupId:
                        type: string
                      name:
                        type: string
                        example: "Large +80 UAH"
                      priceDelta:
                        type: number
                        default: 0
              example:
                productId: clxxxxx
                quantity: 2
                selectedOptions:
                  - optionId: opt1
                    groupId: grp1
                    name: "Large"
                    priceDelta: 80
      responses:
        "201":
          description: Item added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/cart/items/{cartItemId}:
    put:
      tags: [Cart]
      summary: Update cart item quantity
      description: Change the quantity of a cart item. Total price is recalculated automatically.
      operationId: updateCartItem
      parameters:
        - $ref: "#/components/parameters/cartItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Cart item updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Cart]
      summary: Remove cart item
      description: Remove an item from the cart.
      operationId: removeCartItem
      parameters:
        - $ref: "#/components/parameters/cartItemId"
      responses:
        "200":
          description: Item removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNull"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  #  ORDERS (Customer)
  # ============================================================
  /api/orders:
    get:
      tags: [Orders]
      summary: List my orders
      description: Get paginated list of the authenticated user's orders with branch, items, and payment info.
      operationId: listMyOrders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, confirmed, cooking, ready, delivering, completed, cancelled]
          description: Filter by order status
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/PaginatedOrders"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Orders]
      summary: Create order
      description: |
        Place an order from the current cart. The cart is consumed (cleared) on success.
        Supports delivery and pickup, promotion codes, and bonus point usage.
        Creates a payment record automatically. For card payments, call /api/payments/intent next.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  message:
                    type: string
                    example: "Order created successfully"
                  data:
                    $ref: "#/components/schemas/Order"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get order detail
      description: Get full order detail with items, branch info, payments, and promotion. Customers can only view their own orders (admins can view any).
      operationId: getOrder
      parameters:
        - $ref: "#/components/parameters/orderId"
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/OrderDetail"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/orders/{orderId}/cancel:
    post:
      tags: [Orders]
      summary: Cancel order
      description: Cancel an order. Only possible in 'new' or 'confirmed' status. Used bonus points are refunded.
      operationId: cancelOrder
      parameters:
        - $ref: "#/components/parameters/orderId"
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessNull"
        "400":
          description: Cancellation failed (invalid status transition)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/orders/{orderId}/repeat:
    post:
      tags: [Orders]
      summary: Repeat order
      description: Re-populate the cart with items from a previous order (only available items). Replaces any existing cart.
      operationId: repeatOrder
      parameters:
        - $ref: "#/components/parameters/orderId"
      responses:
        "200":
          description: Cart populated from previous order
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  message:
                    type: string
                    example: "Cart populated from previous order"
                  data:
                    $ref: "#/components/schemas/CartWithTotals"
        "400":
          description: Reorder failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/orders/{orderId}/status:
    put:
      tags: [Orders]
      summary: Update order status (admin)
      description: >
        Transition an order to a new status. Follows the state machine:
        new → confirmed → cooking → ready → delivering → completed.
      operationId: updateOrderStatus
      parameters:
        - $ref: "#/components/parameters/orderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [new, confirmed, cooking, ready, delivering, completed, cancelled]
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessData"
        "400":
          description: Invalid status or transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ============================================================
  #  PAYMENTS
  # ============================================================
  /api/payments/intent:
    post:
      tags: [Payments]
      summary: Create payment intent
      description: Create a payment intent for a card payment. In production, this would call a real payment provider (LiqPay/Stripe/Portmone). Currently returns a simulated payment URL.
      operationId: createPaymentIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: string
      responses:
        "200":
          description: Payment intent created
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    required: [paymentId, providerTxId, amount, paymentUrl]
                    properties:
                      paymentId:
                        type: string
                      providerTxId:
                        type: string
                        example: "txn_1718000000000_abc123"
                      amount:
                        type: number
                      paymentUrl:
                        type: string
                        format: uri
                        example: "https://payment-provider.example.com/pay/txn_xxx"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/payments/webhook/{provider}:
    post:
      tags: [Payments]
      summary: Payment webhook
      description: Webhook endpoint called by payment providers (LiqPay, Portmone, etc.) to notify about payment status changes. Automatically confirms orders on successful payment.
      operationId: paymentWebhook
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            example: liqpay
          description: Payment provider identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                providerTxId:
                  type: string
                status:
                  type: string
                  enum: [success, failure, pending]
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: object
                    properties:
                      received:
                        type: boolean

  # ============================================================
  #  PROMOTIONS (Public)
  # ============================================================
  /api/promotions:

# ============================================================
#  COMPONENTS
# ============================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token (15 min TTL). Obtain via /api/auth/login or /api/auth/refresh."

  parameters:
    branchId:
      name: branchId
      in: path
      required: true
      schema:
        type: string
    orderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
    productId:
      name: productId
      in: path
      required: true
      schema:
        type: string
    categoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: string
    promotionId:
      name: promotionId
      in: path
      required: true
      schema:
        type: string
    addressId:
      name: addressId
      in: path
      required: true
      schema:
        type: string
    cartItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Cart item ID
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    Unauthorized:
      description: Unauthorized — missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Unauthorized
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Admin access required
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Not found
    ValidationError:
      description: Validation error in request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: branchId query parameter is required
    Conflict:
      description: Conflict — resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: CONFLICT
              message: Email already registered
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            error:
              code: INTERNAL_ERROR
              message: Operation failed

  schemas:
    # ---------- Response Envelope ----------
    SuccessNull:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data:
          nullable: true
          description: null for destructive operations
        message:
          type: string
          example: "Cart cleared"

    SuccessData:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        data: {}
        message:
          type: string

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable error message
              example: branchId is required
            details:
              description: Optional additional error details

    # ---------- Auth ----------
    LoginResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
          example: "Registration successful"
        data:
          type: object
          required: [user, loyalty, accessToken, refreshToken]
          properties:
            user:
              $ref: "#/components/schemas/UserBasic"
            loyalty:
              type: object
              required: [balance, tier]
              properties:
                balance:
                  type: number
                  default: 0
                tier:
                  type: string
                  enum: [bronze, silver, gold]
                  default: bronze
            accessToken:
              type: string
              description: "JWT access token (15 min TTL)"
            refreshToken:
              type: string
              description: "Opaque refresh token (30 day TTL)"

    UserBasic:
      type: object
      required: [id, role]
      properties:
        id:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [customer, admin, manager]

    UserProfileWithLoyalty:
      type: object
      required: [id, role]
      properties:
        id:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [customer, admin, manager]
        avatarUrl:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        loyalty:
          type: object
          nullable: true
          properties:
            balance:
              type: number
            lifetime:
              type: number
            tier:
              type: string
              enum: [bronze, silver, gold]

    # ---------- Address ----------
    UserAddress:
      type: object
      required: [id, userId, street]
      properties:
        id:
          type: string
        userId:
          type: string
        label:
          type: string
          nullable: true
          example: "Home"
        street:
          type: string
        building:
          type: string
          nullable: true
        apartment:
          type: string
          nullable: true
        floor:
          type: string
          nullable: true
        entrance:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        isDefault:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AddressInput:
      type: object
      required: [street]
      properties:
        label:
          type: string
          nullable: true
        street:
          type: string
        building:
          type: string
          nullable: true
        apartment:
          type: string
          nullable: true
        floor:
          type: string
          nullable: true
        entrance:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        isDefault:
          type: boolean
          default: false

    # ---------- Branch ----------
    Branch:
      type: object
      required: [id, name, slug, address, isOpen]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        address:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        isOpen:
          type: boolean
        workSchedule:
          type: string
          nullable: true
          description: JSON schedule object e.g. {"mon":"09:00-22:00",...}
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BranchInput:
      type: object
      required: [name, slug, address]
      properties:
        name:
          type: string
        slug:
          type: string
        address:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        isOpen:
          type: boolean
          default: true
        workSchedule:
          type: string
          nullable: true
        description:
          type: string
          nullable: true

    DeliveryZone:
      type: object
      required: [id, branchId, name, minOrder, deliveryFee, estimatedMinutes, isActive]
      properties:
        id:
          type: string
        branchId:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        minOrder:
          type: number
          description: Minimum order amount for this zone
        deliveryFee:
          type: number
        estimatedMinutes:
          type: integer
        polygonData:
          type: string
          nullable: true
          description: JSON polygon coordinates
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ---------- Menu ----------
    Category:
      type: object
      required: [id, name, slug, isActive]
      properties:
        id:
          type: string
        branchId:
          type: string
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CategoryWithProducts:
      type: object
      required: [id, name, slug, products]
      properties:
        id:
          type: string
        branchId:
          type: string
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductWithOptions"

    Product:
      type: object
      required: [id, categoryId, name, slug, price, isAvailable]
      properties:
        id:
          type: string
        categoryId:
          type: string
        branchId:
          type: string
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        price:
          type: number
        weight:
          type: string
          nullable: true
          example: "350g"
        calories:
          type: integer
          nullable: true
        isAvailable:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductWithOptions:
      allOf:
        - $ref: "#/components/schemas/Product"
        - type: object
          properties:
            category:
              $ref: "#/components/schemas/Category"
            optionGroups:
              type: array
              items:
                $ref: "#/components/schemas/ProductOptionGroup"

    ProductOptionGroup:
      type: object
      required: [id, productId, name, isRequired, maxChoices]
      properties:
        id:
          type: string
        productId:
          type: string
        name:
          type: string
          example: "Size"
        isRequired:
          type: boolean
          default: false
        maxChoices:
          type: integer
          default: 1
          description: "0 = unlimited"
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        options:
          type: array
          items:
            $ref: "#/components/schemas/ProductOption"

    ProductOption:
      type: object
      required: [id, groupId, name, priceDelta]
      properties:
        id:
          type: string
        groupId:
          type: string
        name:
          type: string
          example: "Large +80 UAH"
        priceDelta:
          type: number
          default: 0
          description: Additional cost for this option
        sortOrder:
          type: integer

    ProductInput:
      type: object
      required: [categoryId, name, slug, price]
      properties:
        categoryId:
          type: string
        branchId:
          type: string
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        weight:
          type: string
          nullable: true
        calories:
          type: integer
          nullable: true
        isAvailable:
          type: boolean
          default: true
        sortOrder:
          type: integer
          default: 0
        optionGroups:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              isRequired:
                type: boolean
                default: false
              maxChoices:
                type: integer
                default: 1
              sortOrder:
                type: integer
                default: 0
              options:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    priceDelta:
                      type: number
                      default: 0
                    sortOrder:
                      type: integer
                      default: 0

    ProductUpdateInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        weight:
          type: string
          nullable: true
        calories:
          type: integer
          nullable: true
        isAvailable:
          type: boolean
        sortOrder:
          type: integer
        optionGroups:
          type: array
          description: "If provided, all existing option groups are replaced"
          items:
            type: object
            required: [name]
            properties:
              name:
                type: string
              isRequired:
                type: boolean
              maxChoices:
                type: integer
              sortOrder:
                type: integer
              options:
                type: array
                items:
                  type: object
                  required: [name]
                  properties:
                    name:
                      type: string
                    priceDelta:
                      type: number
                    sortOrder:
                      type: integer

    # ---------- Cart ----------
    CartWithTotals:
      type: object
      required: [id, userId, branchId, items, totalItems, subtotal]
      properties:
        id:
          type: string
        userId:
          type: string
        branchId:
          type: string
        branch:
          $ref: "#/components/schemas/Branch"
        items:
          type: array
          items:
            type: object
            required: [id, productId, quantity, totalPrice, product]
            properties:
              id:
                type: string
              cartId:
                type: string
              productId:
                type: string
              quantity:
                type: integer
              selectedOptions:
                type: string
                nullable: true
                description: JSON array of selected options
              totalPrice:
                type: number
              product:
                $ref: "#/components/schemas/Product"
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
        totalItems:
          type: integer
          description: Sum of all item quantities
        subtotal:
          type: number
          description: Sum of all item totalPrice values
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ---------- Orders ----------
    CreateOrderInput:
      type: object
      required: [branchId, type, paymentMethod]
      properties:
        branchId:
          type: string
          description: Branch to order from
        type:
          type: string
          enum: [delivery, pickup]
        addressId:
          type: string
          description: Required when type=delivery
        paymentMethod:
          type: string
          enum: [card, cash, bonus]
        note:
          type: string
          nullable: true
        promotionCode:
          type: string
          nullable: true
        useBonus:
          type: number
          nullable: true
          description: Amount of bonus points to apply

    Order:
      type: object
      required: [id, orderNumber, userId, branchId, type, status, subtotal, discount, total]
      properties:
        id:
          type: string
        orderNumber:
          type: string
          example: "#1042"
        userId:
          type: string
        branchId:
          type: string
        type:
          type: string
          enum: [delivery, pickup]
        status:
          type: string
          enum: [new, confirmed, cooking, ready, delivering, completed, cancelled]
        addressSnapshot:
          type: string
          nullable: true
          description: JSON of delivery address at order time
        deliveryFee:
          type: number
        subtotal:
          type: number
        discount:
          type: number
          default: 0
        total:
          type: number
        note:
          type: string
          nullable: true
        promotionId:
          type: string
          nullable: true
        promotionCode:
          type: string
          nullable: true
        bonusUsed:
          type: number
          default: 0
        estimatedMinutes:
          type: integer
          nullable: true
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        cookingAt:
          type: string
          format: date-time
          nullable: true
        readyAt:
          type: string
          format: date-time
          nullable: true
        deliveringAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        branch:
          type: object
          properties:
            name:
              type: string
            address:
              type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/Payment"

    OrderDetail:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            branch:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                phone:
                  type: string
                  nullable: true
            items:
              type: array
              items:
                allOf:
                  - $ref: "#/components/schemas/OrderItem"
                  - type: object
                    properties:
                      product:
                        type: object
                        properties:
                          imageUrl:
                            type: string
                            nullable: true
            promotion:
              type: object
              nullable: true
              properties:
                name:
                  type: string
                type:
                  type: string
                value:
                  type: number

    OrderItem:
      type: object
      required: [id, orderId, productId, productName, productPrice, quantity, totalPrice]
      properties:
        id:
          type: string
        orderId:
          type: string
        productId:
          type: string
        productName:
          type: string
          description: Snapshot of product name at order time
        productPrice:
          type: number
          description: Snapshot of product price at order time
        quantity:
          type: integer
        selectedOptions:
          type: string
          nullable: true
          description: JSON snapshot of selected options
        totalPrice:
          type: number
        createdAt:
          type: string
          format: date-time

    PaginatedOrders:
      type: object
      required: [orders, total, page, limit, pages]
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        pages:
          type: integer

    # ---------- Payments ----------
    Payment:
      type: object
      required: [id, orderId, method, status, amount]
      properties:
        id:
          type: string
        orderId:
          type: string
        method:
          type: string
          enum: [card, cash, bonus]
        status:
          type: string
          enum: [pending, processing, succeeded, failed, refunded]
        amount:
          type: number
        providerTxId:
          type: string
          nullable: true
        providerPayload:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ---------- Promotions ----------
    Promotion:
      type: object
      required: [id, name, type, value, minOrder, usedCount, startDate, endDate, status]
      properties:
        id:
          type: string
        code:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [percentage, fixed, free_delivery, bonus]
        value:
          type: number
          description: Percentage value, fixed amount, etc.
        minOrder:
          type: number
          default: 0
        maxUses:
          type: integer
          nullable: true
        usedCount:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, inactive, expired]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ValidatedPromotion:
      type: object
      required: [id, name, type, value, discount, freeDelivery]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [percentage, fixed, free_delivery, bonus]
        value:
          type: number
        discount:
          type: number
          description: Calculated discount amount
        freeDelivery:
          type: boolean
        description:
          type: string
          nullable: true

    PromotionInput:
      type: object
      required: [name, type, value, startDate, endDate]
      properties:
        code:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [percentage, fixed, free_delivery, bonus]
        value:
          type: number
        minOrder:
          type: number
          default: 0
        maxUses:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time

    # ---------- Loyalty ----------
    LoyaltyAccount:
      type: object
      required: [id, userId, balance, lifetime, tier]
      properties:
        id:
          type: string
        userId:
          type: string
        balance:
          type: number
          description: Current bonus point balance
        lifetime:
          type: number
          description: Total amount ever spent
        tier:
          type: string
          enum: [bronze, silver, gold]
          description: bronze (< 3000 UAH), silver (>= 3000), gold (>= 10000)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LoyaltyTransaction:
      type: object
      required: [id, accountId, type, amount, balanceAfter]
      properties:
        id:
          type: string
        accountId:
          type: string
        type:
          type: string
          enum: [earned, spent, adjusted, expired]
        amount:
          type: number
          description: Can be negative for spent/expired
        balanceAfter:
          type: number
        description:
          type: string
          nullable: true
        relatedOrderId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ---------- Analytics ----------
    Analytics:
      type: object
      required: [orders, revenue, statusDistribution, topProducts, recentOrders]
      properties:
        orders:
          type: object
          required: [today, week, month]
          properties:
            today:
              type: integer
            week:
              type: integer
            month:
              type: integer
        revenue:
          type: object
          required: [today, week, month]
          properties:
            today:
              type: number
            week:
              type: number
            month:
              type: number
        statusDistribution:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer
        topProducts:
          type: array
          items:
            type: object
            required: [name, quantity, revenue]
            properties:
              name:
                type: string
              quantity:
                type: integer
              revenue:
                type: number
        recentOrders:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              orderNumber:
                type: string
              status:
                type: string
              total:
                type: number
              createdAt:
                type: string
                format: date-time
              user:
                type: object
                properties:
                  firstName:
                    type: string
                  lastName:
                    type: string
                  phone:
                    type: string
              branch:
                type: object
                properties:
                  name:
                    type: string
              items:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    productName:
                      type: string
                    quantity:
                      type: integer
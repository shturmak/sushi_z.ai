      tags: [Promotions]
      summary: List active promotions
      description: Get all currently active promotions (within date range).
      operationId: listPromotions
      security: []
      responses:
        "200":
          description: Active promotions
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Promotion"

  /api/promotions/validate:
    post:
      tags: [Promotions]
      summary: Validate promotion code
      description: Check if a promotion code is valid for the given subtotal. Returns the promotion details and calculated discount.
      operationId: validatePromotion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, subtotal]
              properties:
                code:
                  type: string
                  description: Promotion code to validate
                subtotal:
                  type: number
                  minimum: 0.01
                  description: Cart subtotal for minimum order check
      responses:
        "200":
          description: Promotion is valid
          content:
            application/json:
              schema:
                type: object
                required: [success, data]
                properties:
                  success:
                    type: boolean
                    const: true
                  data:
                    $ref: "#/components/schemas/ValidatedPromotion"
        "400":
          description: Invalid or expired promotion
          content:
            application/json:
              schema:

# =============================================================================
# SushiChain — Staging Docker Compose
# =============================================================================
# Usage:
#   cp .env.staging .env    # fill in real DATABASE_URL
#   docker compose -f docker-compose.staging.yml up -d --build
#
# For local PostgreSQL (without Supabase):
#   Uncomment the 'db' service below and set
#   DATABASE_URL=postgresql://sushichain:sushi@db:5432/sushichain_staging
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Next.js Application (Staging)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENV: staging
    container_name: sushichain-staging
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: staging
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    volumes:
      - app_uploads_staging:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - staging

  # ---------------------------------------------------------------------------
  # Optional: Local PostgreSQL (comment out if using Supabase)
  # ---------------------------------------------------------------------------
  # db:
  #   image: postgres:16-alpine
  #   container_name: sushichain-staging-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: sushichain
  #     POSTGRES_PASSWORD: sushi
  #     POSTGRES_DB: sushichain_staging
  #   volumes:
  #     - postgres_staging:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U sushichain -d sushichain_staging"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 10s
  #   networks:
  #     - staging

volumes:
  app_uploads_staging:
    driver: local
  # postgres_staging:
  #   driver: local

networks:
  staging:
    driver: bridge
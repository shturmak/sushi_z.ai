# =============================================================================
# SushiChain — Production Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env   # then fill in values
#   docker compose up -d
#
# To rebuild after code changes:
#   docker compose up -d --build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: sushichain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sushichain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sushichain}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sushichain} -d ${POSTGRES_DB:-sushichain}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Next.js Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sushichain-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to Docker postgres service
      DATABASE_URL: postgresql://${POSTGRES_USER:-sushichain}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sushichain}?schema=public
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_uploads:/app/public/uploads
      - app_public:/app/public
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: sushichain-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
      - external

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local
  app_public:
    driver: local
  nginx_certs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  internal:
    driver: bridge
  external:
    driver: bridge
# =============================================================================
# SushiChain - Main Nginx Configuration
# Multi-brand food ordering platform reverse proxy
# =============================================================================

# Run as a single worker process in containers; tune for host deployments
worker_processes auto;

# Error log level: notice is good for production, info/debug for troubleshooting
error_log /var/log/nginx/error.log notice;
pid       /tmp/nginx.pid;

events {
    # Maximum concurrent connections per worker
    worker_connections 1024;

    # Accept connections as they arrive (no thundering herd)
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------------------
    # Logging format (combined + upstream response time for observability)
    # ---------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # Compress text-based content to reduce bandwidth
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2
        font/woff;

    # ---------------------------------------------------------------------------
    # Upstream: Next.js application running on port 3000
    # ---------------------------------------------------------------------------
    upstream nextjs {
        server app:3000;

        # Keep-alive to reduce connection overhead between Nginx and Next.js
        keepalive 32;
    }

    # ---------------------------------------------------------------------------
    # Rate limiting zone for API endpoints
    # 10 requests/second per IP, burst of 20
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ---------------------------------------------------------------------------
    # Map: extract brand slug from subdomain
    #   - *.sushichain.example.com  -> captured subdomain becomes brand slug
    #   - sushichain.example.com    -> empty (main domain / brand picker)
    # ---------------------------------------------------------------------------
    map $host $brand_slug {
        default                  "";
        ~^([a-z0-9-]+)\.sushichain\.example\.com$  $1;
    }

    # ---------------------------------------------------------------------------
    # Request body size limit (10 MB for image uploads)
    # ---------------------------------------------------------------------------
    client_max_body_size 10m;

    # ---------------------------------------------------------------------------
    # Proxy buffering / timeouts
    # ---------------------------------------------------------------------------
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;

    # ---------------------------------------------------------------------------
    # Hide Nginx version for security
    # ---------------------------------------------------------------------------
    server_tokens off;

    # ---------------------------------------------------------------------------
    # Include site-specific configurations
    # ---------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites/*.conf;
}
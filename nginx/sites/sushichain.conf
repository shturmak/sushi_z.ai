# =============================================================================
# SushiChain - Multi-brand site configuration
#
# This file handles:
#   1. Wildcard subdomain routing  (*.sushichain.example.com -> brand slug)
#   2. Main domain (brand picker / super admin)
#   3. WebSocket upgrade for /socket.io/
#   4. Rate limiting on API endpoints
#   5. Static asset caching
#
# SSL: See ssl-template.conf.example for HTTPS configuration.
#       To enable, uncomment the SSL directives and the HTTP->HTTPS redirect
#       server block at the bottom of this file.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP server (port 80) — main entry point
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name
        sushichain.example.com
        *.sushichain.example.com;

    # Uncomment the following to redirect all HTTP traffic to HTTPS
    # once SSL certificates are in place:
    #
    # return 301 https://$host$request_uri;

    # -----------------------------------------------------------------------
    # Security headers (applied to every response)
    # -----------------------------------------------------------------------
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options  "nosniff"     always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------------------
    # Static assets — long cache for immutable files
    # Next.js outputs hashed filenames: _next/static/ files never change
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cache static assets for 365 days; they are content-hashed by Next.js
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Public static files (favicons, manifest, images, fonts)
    # Cache for 30 days; these rarely change
    # -----------------------------------------------------------------------
    location /static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Favicon and manifest — short cache, proxied to Next.js
    # -----------------------------------------------------------------------
    location = /favicon.ico {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 7d;
        access_log off;
    }

    location = /manifest.json {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 1d;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Service worker — must not be cached aggressively
    # -----------------------------------------------------------------------
    location = /sw.js {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # -----------------------------------------------------------------------
    # WebSocket support for /socket.io/ (real-time order updates)
    # -----------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;

        # Required WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for persistent WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -----------------------------------------------------------------------
    # API endpoints — rate limited
    # Burst of 20 with no delay queue; excess returns 503
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass the brand slug extracted from subdomain via map block
        proxy_set_header X-Brand-Slug      $brand_slug;
    }

    # -----------------------------------------------------------------------
    # All other requests — pass to Next.js with full proxy headers
    # This handles pages, ISR, and all Next.js server-side rendering
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass the brand slug extracted from subdomain via map block
        proxy_set_header X-Brand-Slug      $brand_slug;
    }
}

